<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Achtergrond -->
  <rect width="32" height="32" rx="6" fill="#0d0705"/>

  <!-- Jukebox body -->
  <rect x="7" y="10" width="18" height="16" rx="3" fill="#1e1410" stroke="#ff6b00" stroke-width="1"/>

  <!-- Jukebox top (gebogen) -->
  <path d="M7 13 Q7 8 16 8 Q25 8 25 13" fill="#271a12" stroke="#ffaa00" stroke-width="1"/>

  <!-- Display scherm -->
  <rect x="10" y="13" width="12" height="6" rx="1.5" fill="#0d0705" stroke="#ff6b00" stroke-width="0.8"/>

  <!-- Neon gloed in scherm -->
  <rect x="11" y="14" width="10" height="4" rx="1" fill="#ff3300" opacity="0.3"/>
  <text x="16" y="17.5" font-size="3.5" fill="#ffaa00" text-anchor="middle" font-family="monospace" font-weight="bold">JS</text>

  <!-- Knoppen onderaan -->
  <circle cx="11.5" cy="22.5" r="1.2" fill="#ff6b00"/>
  <circle cx="16" cy="22.5" r="1.2" fill="#ffaa00"/>
  <circle cx="20.5" cy="22.5" r="1.2" fill="#ff3366"/>

  <!-- Neon streepje bovenaan -->
  <line x1="10" y1="11" x2="22" y2="11" stroke="#ffaa00" stroke-width="0.8" opacity="0.8"/>
</svg>
